{% extends 'admin/base.html' %}
{% block title %}Site Settings — Admin{% endblock %}
{% block page_content %}
<h1 class="font-display text-2xl font-bold mb-6">Site Settings</h1>
<form method="POST" action="{{ url_for('admin.settings') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    {% for key, s in settings.items() %}
    <div class="card">
      <label class="form-label">{{ s.description or key }}</label>
      {% if s.type == 'boolean' %}
      <select name="{{ key }}" class="input">
        <option value="true" {% if s.value == 'true' %}selected{% endif %}>Enabled</option>
        <option value="false" {% if s.value == 'false' %}selected{% endif %}>Disabled</option>
      </select>
      {% else %}
      <input type="text" name="{{ key }}" class="input" value="{{ s.value }}">
      {% endif %}
      <p style="font-size:.72rem;color:var(--text-dim);margin-top:.4rem;font-family:monospace">{{ key }}</p>
    </div>
    {% endfor %}
  </div>
  <button type="submit" class="btn btn-primary btn-lg mt-6">
    <i data-feather="save" style="width:17px;height:17px"></i> Save All Settings
  </button>
</form>
{% endblock %}
