{% set a = a if a is defined else None %}
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div>
  <label class="block text-xs font-semibold text-gray-700 mb-1.5">Title</label>
  <input type="text" name="title" required value="{{ a.title if a else '' }}"
         class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-forest-500 focus:ring-1 focus:ring-forest-500" />
</div>

<div>
  <label class="block text-xs font-semibold text-gray-700 mb-1.5">Message</label>
  <textarea name="message" rows="4" required
    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-forest-500 focus:ring-1 focus:ring-forest-500 resize-none">{{ a.message if a else '' }}</textarea>
</div>

<label class="flex items-center gap-3 bg-red-50/60 rounded-xl p-3.5 border border-red-100 cursor-pointer">
  <input type="checkbox" name="is_important" {{ 'checked' if a and a.is_important else '' }}
         class="w-4 h-4 text-red-600 rounded border-gray-300" />
  <div>
    <p class="text-sm font-semibold text-gray-800">Mark as Important</p>
    <p class="text-xs text-gray-400">Shows a red "Important" badge to recipients</p>
  </div>
</label>

<div>
  <label class="block text-xs font-semibold text-gray-700 mb-2">Send To</label>
  <div class="flex gap-3 mb-3" onchange="toggleTargetFields(this.closest('form'))">
    <label class="flex-1 flex items-center gap-2 border border-gray-200 rounded-xl px-4 py-2.5 cursor-pointer has-[:checked]:border-forest-500 has-[:checked]:bg-forest-50">
      <input type="radio" name="target_type" value="all" {{ 'checked' if not a or a.target_type == 'all' else '' }} class="text-forest-600" />
      <span class="text-sm font-medium text-gray-700">All Users</span>
    </label>
    <label class="flex-1 flex items-center gap-2 border border-gray-200 rounded-xl px-4 py-2.5 cursor-pointer has-[:checked]:border-forest-500 has-[:checked]:bg-forest-50">
      <input type="radio" name="target_type" value="selected" {{ 'checked' if a and a.target_type == 'selected' else '' }} class="text-forest-600" />
      <span class="text-sm font-medium text-gray-700">Selected Users</span>
    </label>
  </div>
  <div class="target-selected-users {{ 'hidden' if not a or a.target_type != 'selected' else '' }} max-h-40 overflow-y-auto border border-gray-100 rounded-xl p-3 space-y-1.5">
    {% for u in users %}
    <label class="flex items-center gap-2.5 px-2 py-1.5 rounded-lg hover:bg-gray-50 cursor-pointer">
      <input type="checkbox" name="target_user_ids" value="{{ u.id }}"
             {{ 'checked' if a and a.target_user_ids and u.id in a.target_user_ids else '' }}
             class="w-3.5 h-3.5 text-forest-600 rounded border-gray-300" />
      <span class="text-xs text-gray-600">{{ u.full_name }} <span class="text-gray-400">({{ u.email }})</span></span>
    </label>
    {% else %}
    <p class="text-xs text-gray-400 px-2 py-1.5">No users yet.</p>
    {% endfor %}
  </div>
</div>

<div>
  <label class="block text-xs font-semibold text-gray-700 mb-1.5">Schedule For <span class="text-gray-400 font-normal">(optional)</span></label>
  <input type="datetime-local" name="scheduled_at"
         value="{{ a.scheduled_at | date_fmt('%Y-%m-%dT%H:%M') if a and a.scheduled_at else '' }}"
         class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-forest-500 focus:ring-1 focus:ring-forest-500" />
  <p class="text-xs text-gray-400 mt-1">Leave blank to publish immediately.</p>
</div>
