{% extends 'base.html' %}
{% block title %}Contact Us — MercX Digital{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto;padding:4rem 1.25rem">
  <h1 class="font-display text-3xl font-bold mb-3">Contact Us</h1>
  <p class="mb-8" style="color:var(--text-muted)">Have a question or need help? Reach out and our team will get back to you within 24 hours.</p>
  <div class="card">
    <form>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="form-group"><label class="form-label">Name</label><input type="text" class="input" required></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="input" required></div>
      </div>
      <div class="form-group"><label class="form-label">Subject</label><input type="text" class="input" required></div>
      <div class="form-group"><label class="form-label">Message</label><textarea class="input" rows="5" required></textarea></div>
      <button type="submit" class="btn btn-primary w-full justify-center btn-lg">
        <i data-feather="send" style="width:17px;height:17px"></i> Send Message
      </button>
    </form>
  </div>
  <div class="flex items-center gap-2 mt-6 justify-center" style="font-size:.85rem;color:var(--text-muted)">
    <i data-feather="mail" style="width:14px;height:14px"></i> hello@mercxdigital.com
  </div>
</div>
{% endblock %}
