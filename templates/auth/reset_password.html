{% extends 'base.html' %}
{% block title %}Reset Password — MercX Digital{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
  <div style="width:100%;max-width:420px">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(16,185,129,.15);color:#10B981">
        <i data-feather="key" style="width:28px;height:28px"></i>
      </div>
      <h1 class="font-display text-2xl font-bold mb-2">Set New Password</h1>
      <p style="color:var(--text-muted);font-size:.92rem">Choose a strong password for your account</p>
    </div>
    <div class="card" style="border-color:rgba(16,185,129,.2)">
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div style="position:relative">
            <i data-feather="lock" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted)"></i>
            <input type="password" name="password" id="pw1" class="input" style="padding-left:2.6rem"
                   placeholder="Minimum 8 characters" minlength="8" required autofocus oninput="checkStrength(this.value)">
          </div>
          <div id="pw-strength" class="progress mt-2" style="display:none">
            <div id="pw-bar" class="progress-bar" style="width:0"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div style="position:relative">
            <i data-feather="lock" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted)"></i>
            <input type="password" name="confirm_password" class="input" style="padding-left:2.6rem"
                   placeholder="Repeat new password" minlength="8" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full justify-center btn-lg">
          <i data-feather="check" style="width:17px;height:17px"></i> Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
function checkStrength(v) {
  const bar = document.getElementById('pw-bar'), wrap = document.getElementById('pw-strength');
  wrap.style.display = 'block';
  let s = 0;
  if (v.length >= 8) s += 25; if (/[A-Z]/.test(v)) s += 25;
  if (/[0-9]/.test(v)) s += 25; if (/[^A-Za-z0-9]/.test(v)) s += 25;
  bar.style.width = s + '%';
  bar.style.background = s <= 25 ? '#EF4444' : s <= 50 ? '#F59E0B' : s <= 75 ? '#06B6D4' : '#10B981';
}
</script>
{% endblock %}
