{% extends 'base.html' %}
{% block title %}Log In — MercX Digital{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4" style="background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(124,58,237,.1),transparent 70%)">
  <div style="width:100%;max-width:440px">
    <div class="text-center mb-8">
      <a href="{{ url_for('main.index') }}" class="font-display font-bold text-2xl gradient-text">⚡ MercX Digital</a>
      <h1 class="font-display text-2xl font-bold mt-4 mb-2">Welcome back</h1>
      <p style="color:var(--text-muted);font-size:.92rem">Sign in to your account</p>
    </div>

    <div class="card" style="border-color:rgba(124,58,237,.2)">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
          <label class="form-label">Email or Username</label>
          <div style="position:relative">
            <i data-feather="user" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted)"></i>
            <input type="text" name="identifier" class="input" style="padding-left:2.6rem"
                   placeholder="email@example.com" value="{{ request.form.get('identifier','') }}" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <div class="flex justify-between items-center mb-1">
            <label class="form-label" style="margin:0">Password</label>
            <a href="{{ url_for('auth.forgot_password') }}" style="font-size:.8rem;color:var(--primary-light)">Forgot password?</a>
          </div>
          <div style="position:relative">
            <i data-feather="lock" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted)"></i>
            <input type="password" name="password" id="password-field" class="input" style="padding-left:2.6rem;padding-right:2.6rem"
                   placeholder="Your password" required>
            <button type="button" onclick="togglePw('password-field','toggle-eye')"
                    style="position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0">
              <i data-feather="eye" id="toggle-eye" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>

        <label class="flex items-center gap-3 mb-5 cursor-pointer">
          <input type="checkbox" name="remember" class="w-4 h-4 rounded" style="accent-color:var(--primary)">
          <span style="font-size:.88rem;color:var(--text-muted)">Remember me for 30 days</span>
        </label>

        <button type="submit" class="btn btn-primary w-full justify-center btn-lg">
          <i data-feather="log-in" style="width:17px;height:17px"></i>
          Sign In
        </button>
      </form>

      <div class="divider" style="margin:1.5rem 0"><span style="font-size:.8rem;color:var(--text-dim);background:var(--bg-card);padding:0 .75rem;position:relative;z-index:1">OR</span></div>

      <p class="text-center" style="font-size:.88rem;color:var(--text-muted)">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" style="color:var(--primary-light);font-weight:600">Create one free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
function togglePw(fieldId, iconId) {
  const f = document.getElementById(fieldId);
  const i = document.getElementById(iconId);
  f.type = f.type === 'password' ? 'text' : 'password';
  i.setAttribute('data-feather', f.type === 'password' ? 'eye' : 'eye-off');
  feather.replace({'stroke-width':1.75});
}
</script>
{% endblock %}
