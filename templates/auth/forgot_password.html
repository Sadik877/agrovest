{% extends 'base.html' %}
{% block title %}Forgot Password — MercX Digital{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
  <div style="width:100%;max-width:420px">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(124,58,237,.15);color:var(--primary-light)">
        <i data-feather="mail" style="width:28px;height:28px"></i>
      </div>
      <h1 class="font-display text-2xl font-bold mb-2">Forgot your password?</h1>
      <p style="color:var(--text-muted);font-size:.92rem">Enter your email and we'll send a reset link</p>
    </div>
    <div class="card" style="border-color:rgba(124,58,237,.2)">
      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div style="position:relative">
            <i data-feather="mail" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted)"></i>
            <input type="email" name="email" class="input" style="padding-left:2.6rem"
                   placeholder="your@email.com" required autofocus>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-full justify-center btn-lg">
          <i data-feather="send" style="width:17px;height:17px"></i> Send Reset Link
        </button>
      </form>
      <p class="text-center mt-5" style="font-size:.88rem;color:var(--text-muted)">
        Remembered it? <a href="{{ url_for('auth.login') }}" style="color:var(--primary-light);font-weight:600">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
