{% extends "base.html" %}
{% block title %}Log In — AgroVest Pro{% endblock %}

{% block body %}
<div class="min-h-screen bg-forest-950 grain relative flex items-center justify-center px-4 py-16">
  <div class="absolute inset-0 bg-gradient-to-br from-forest-950 via-forest-900 to-dark"></div>
  <div class="absolute inset-0" style="background-image: radial-gradient(ellipse at 30% 70%, rgba(201,168,76,0.1) 0%, transparent 60%);"></div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gold-500 flex items-center justify-center">
          <span class="text-forest-950 font-display font-bold text-xl">A</span>
        </div>
        <span class="font-display font-bold text-2xl text-white">Agro<span class="text-gold-500">Vest</span></span>
      </a>
      <h1 class="font-display text-2xl font-bold text-white">Welcome back</h1>
      <p class="text-gray-400 text-sm mt-1">Log in to access your investment dashboard</p>
    </div>

    <div class="glass rounded-2xl p-8">
      <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-200 mb-2">Email Address</label>
          <div class="relative">
            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="email" name="email" required placeholder="you@example.com"
              class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-200 mb-2">Password</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="password" name="password" id="password" required placeholder="••••••••"
              class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-10 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors" />
            <button type="button" onclick="togglePwd('password','eyeBtn')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white" id="eyeBtn">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="w-full bg-gold-500 hover:bg-gold-600 text-forest-950 font-bold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-gold-500/30">
          Log In to Dashboard
        </button>
      </form>

      <div class="mt-6 text-center text-sm">
        <span class="text-gray-400">Don't have an account?</span>
        <a href="{{ url_for('register') }}" class="text-gold-400 font-semibold hover:text-gold-300 ml-1">Create one free</a>
      </div>
    </div>

    <p class="text-center mt-6">
      <a href="{{ url_for('index') }}" class="text-gray-500 text-xs hover:text-gray-300 transition-colors">← Back to homepage</a>
    </p>
  </div>
</div>

<script>
function togglePwd(inputId, btnId) {
  const inp = document.getElementById(inputId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
