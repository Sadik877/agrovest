{% extends "base.html" %}
{% block title %}Create Account — AgroVest Pro{% endblock %}

{% block body %}
<div class="min-h-screen bg-forest-950 grain relative flex items-center justify-center px-4 py-16">
  <div class="absolute inset-0 bg-gradient-to-br from-forest-950 via-forest-900 to-dark"></div>
  <div class="absolute inset-0" style="background-image: radial-gradient(ellipse at 70% 30%, rgba(201,168,76,0.1) 0%, transparent 60%);"></div>

  <div class="relative z-10 w-full max-w-lg">
    <div class="text-center mb-8">
      <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gold-500 flex items-center justify-center">
          <span class="text-forest-950 font-display font-bold text-xl">A</span>
        </div>
        <span class="font-display font-bold text-2xl text-white">Agro<span class="text-gold-500">Vest</span></span>
      </a>
      <h1 class="font-display text-2xl font-bold text-white">Start Earning Today</h1>
      <p class="text-gray-400 text-sm mt-1">Create your free AgroVest account in 2 minutes</p>
    </div>

    <div class="glass rounded-2xl p-8">
      <form method="POST" action="{{ url_for('register') }}" class="space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-200 mb-2">Full Name</label>
            <div class="relative">
              <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input type="text" name="full_name" required placeholder="Emeka Okonkwo"
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors" />
            </div>
          </div>

          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-200 mb-2">Email Address</label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input type="email" name="email" required placeholder="emeka@example.com"
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors" />
            </div>
          </div>

          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-200 mb-2">Phone Number</label>
            <div class="relative">
              <i data-lucide="phone" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input type="tel" name="phone" placeholder="0801 234 5678"
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-200 mb-2">Password</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input type="password" name="password" id="pwd" required placeholder="Min 8 chars"
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-10 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors" />
              <button type="button" onclick="togglePwd('pwd')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                <i data-lucide="eye" class="w-4 h-4"></i>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-200 mb-2">Confirm Password</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input type="password" name="confirm_password" id="cpwd" required placeholder="Repeat password"
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors" />
            </div>
          </div>

          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-200 mb-2">Referral Code <span class="text-gray-500">(optional)</span></label>
            <div class="relative">
              <i data-lucide="gift" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
              <input type="text" name="referral_code" value="{{ ref_code }}" placeholder="Enter referral code"
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-500 text-sm focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-colors uppercase" />
            </div>
          </div>
        </div>

        <div class="flex items-start gap-3">
          <input type="checkbox" id="terms" required class="mt-0.5 w-4 h-4 rounded border-white/20 bg-white/5 text-gold-500" />
          <label for="terms" class="text-xs text-gray-400">
            I agree to AgroVest's <a href="#" class="text-gold-400 hover:underline">Terms of Service</a>,
            <a href="#" class="text-gold-400 hover:underline">Privacy Policy</a>, and acknowledge the
            <a href="#" class="text-gold-400 hover:underline">Investment Risk Disclosure</a>.
          </label>
        </div>

        <button type="submit" class="w-full bg-gold-500 hover:bg-gold-600 text-forest-950 font-bold py-3.5 rounded-xl transition-all shadow-lg">
          Create My Account
        </button>
      </form>

      <div class="mt-6 text-center text-sm">
        <span class="text-gray-400">Already have an account?</span>
        <a href="{{ url_for('login') }}" class="text-gold-400 font-semibold hover:text-gold-300 ml-1">Log in</a>
      </div>
    </div>
  </div>
</div>

<script>
function togglePwd(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
