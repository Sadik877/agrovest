{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block body %}
<div class="min-h-screen bg-forest-950 flex items-center justify-center px-4">
  <div class="text-center">
    <p class="text-gold-400 font-display text-8xl font-bold mb-4">404</p>
    <h1 class="text-white font-display text-2xl font-bold mb-3">Page Not Found</h1>
    <p class="text-gray-400 mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <div class="flex gap-4 justify-center">
      <a href="{{ url_for('index') }}" class="bg-gold-500 hover:bg-gold-600 text-forest-950 font-bold px-8 py-3 rounded-xl transition-all">Return Home</a>
      {% if current_user %}
      <a href="{{ url_for('dashboard') }}" class="glass hover:bg-white/10 text-white font-semibold px-8 py-3 rounded-xl transition-all">Dashboard</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
