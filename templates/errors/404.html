{% extends 'base.html' %}
{% block title %}Page Not Found — MercX Digital{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center text-center px-4" style="padding:4rem 1rem">
  <div>
    <div class="font-display font-black gradient-text" style="font-size:8rem;line-height:1">404</div>
    <h1 class="font-display text-2xl font-bold mb-3">Page Not Found</h1>
    <p class="mb-8" style="color:var(--text-muted);max-width:380px;margin-left:auto;margin-right:auto">
      The page you're looking for doesn't exist or may have been moved.
    </p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">
      <i data-feather="home" style="width:17px;height:17px"></i> Back to Home
    </a>
  </div>
</div>
{% endblock %}
