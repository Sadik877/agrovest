{% extends 'base.html' %}
{% block title %}Server Error — MercX Digital{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center text-center px-4" style="padding:4rem 1rem">
  <div>
    <div class="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6" style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25)">
      <i data-feather="alert-triangle" style="width:36px;height:36px;color:var(--warning)"></i>
    </div>
    <h1 class="font-display text-3xl font-bold mb-3">Something Went Wrong</h1>
    <p class="mb-8" style="color:var(--text-muted);max-width:400px;margin-left:auto;margin-right:auto">
      We've hit an unexpected error. Our team has been notified and is looking into it.
    </p>
    <div class="flex gap-4 justify-center">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg"><i data-feather="home" style="width:17px;height:17px"></i> Home</a>
      <a href="{{ url_for('main.contact') }}" class="btn btn-ghost btn-lg">Contact Support</a>
    </div>
  </div>
</div>
{% endblock %}
