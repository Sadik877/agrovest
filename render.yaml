services:
  - type: web
    name: agrovest-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true

      # ── Required: from Supabase Dashboard → Project Settings → API ──
      # SUPABASE_URL  = "Project URL"      e.g. https://abcxyzproject.supabase.co
      # SUPABASE_KEY  = "Secret key" (sb_secret_...) — on older projects this
      #                  is called the "service_role" key instead (under a
      #                  "Legacy API Keys" tab). Either works. Do NOT use the
      #                  "Publishable key" / "anon" key — the app manages its
      #                  own auth/admin checks and needs to read and write
      #                  every table regardless of row-level policy
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # ── Optional: persist deposit-proof uploads in Supabase Storage instead
      #     of Render's local disk, which is wiped on every deploy/restart.
      #     Run the bucket-creation block at the bottom of supabase_setup.sql
      #     first, then set this to "true". Safe to leave as "false" (default) —
      #     uploads still work, they just won't survive a redeploy.
      - key: USE_SUPABASE_STORAGE
        value: "false"

      # ── Optional: show a "down for maintenance" page to everyone except
      #     logged-in admins. Flip to "true" + redeploy when you need to take
      #     the site down briefly; admins can still log in and use it normally.
      - key: MAINTENANCE_MODE
        value: "false"
      - key: MAINTENANCE_MESSAGE
        value: ""

      # NOTE: RENDER=true is set automatically by Render itself — you do not
      # need to add it. The app uses it to detect HTTPS-only cookies and the
      # ephemeral /tmp upload path.
      - key: PYTHON_VERSION
        value: "3.11.15"
